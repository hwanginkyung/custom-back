app:
  security:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allow-docs: false
    refresh-cookie:
      name: refresh_token
      secure: ${REFRESH_COOKIE_SECURE:true}
      same-site: ${REFRESH_COOKIE_SAME_SITE:None}
  bootstrap-admin:
    enabled: true
    email: admin@jinsol.co.kr
    password: admin1234
    role: ADMIN
    company-name: 진솔 관세법인
    business-number: 123-45-67890
    reset-password-on-startup: true

server:
  address: 0.0.0.0
  port: 8081
  forward-headers-strategy: framework

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://mysql:3306/cafe?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=false&serverTimezone=Asia/Seoul&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true}
    username: ${DATABASE_USERNAME:cafe}
    password: ${DATABASE_PASSWORD:cafe}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate.jdbc.batch_size: 20
      hibernate.order_inserts: true
      hibernate.order_updates: true
  h2:
    console:
      enabled: false

jwt:
  secret: ${JWT_SECRET:4fe29ca35684eaa6833507f0ebdae8a80a188b58f66ed1f20a4f88bc3ccb8ed0}
  access-token-expire-ms: ${JWT_ACCESS_TOKEN_EXPIRE_MS:1800000}
  refresh-token-expire-ms: ${JWT_REFRESH_TOKEN_EXPIRE_MS:1209600000}

ncustoms:
  api:
    permit-all: ${NCUSTOMS_API_PERMIT_ALL:false}
  temp-save:
    agent-token: ${NCUSTOMS_TEMP_SAVE_AGENT_TOKEN:${CLIENT_SYNC_AGENT_TOKEN:}}
  datasource:
    enabled: ${NCUSTOMS_DB_ENABLED:false}
    url: ${NCUSTOMS_DB_URL:jdbc:mysql://192.168.0.46:53306/ncustoms?useUnicode=true&characterEncoding=EUC-KR&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${NCUSTOMS_DB_USERNAME:kcba}
    password: ${NCUSTOMS_DB_PASSWORD:kcbapasswd}
    driver-class-name: ${NCUSTOMS_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    connection-init-sql: ${NCUSTOMS_DB_INIT_SQL:SET NAMES euckr}
  export:
    create-enabled: ${NCUSTOMS_CREATE_ENABLED:false}
    lock-timeout-seconds: ${NCUSTOMS_LOCK_TIMEOUT_SECONDS:10}

client:
  sync:
    push:
      agent-token: ${CLIENT_SYNC_AGENT_TOKEN:}

cariv:
  sync:
    push:
      agent-token: ${CARIV_SYNC_AGENT_TOKEN:cariv-bridge-token-2026-0508}
      previous-agent-token: ${CARIV_SYNC_PREVIOUS_AGENT_TOKEN:}
      require-https: ${CARIV_SYNC_REQUIRE_HTTPS:true}
      allowed-ips: ${CARIV_SYNC_ALLOWED_IPS:}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:cariv-export}
      download-timeout-ms: ${AWS_S3_DOWNLOAD_TIMEOUT_MS:10000}
