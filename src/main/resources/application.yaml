server:
  address: 0.0.0.0
  port: 8081

app:
  security:
    allowed-origins:
      - http://localhost:5174
      - http://127.0.0.1:5174
    allow-docs: true
    refresh-cookie:
      name: refresh_token
      secure: false
      same-site: Lax

spring:
  application:
    name: cariv-customs
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:h2:mem:cafe;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:4fe29ca35684eaa6833507f0ebdae8a80a188b58f66ed1f20a4f88bc3ccb8ed0}
  access-token-expire-ms: 1800000
  refresh-token-expire-ms: 1209600000
