server:
  address: 0.0.0.0
  port: 8081

app:
  security:
    allowed-origins:
      - http://localhost:5174
      - http://127.0.0.1:5174
    allow-docs: true
    refresh-cookie:
      name: refresh_token
      secure: false
      same-site: Lax

spring:
  application:
    name: cariv-customs
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:h2:mem:cafe;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:4fe29ca35684eaa6833507f0ebdae8a80a188b58f66ed1f20a4f88bc3ccb8ed0}
  access-token-expire-ms: 1800000
  refresh-token-expire-ms: 1209600000

ncustoms:
  api:
    permit-all: ${NCUSTOMS_API_PERMIT_ALL:false}
  datasource:
    enabled: false
    url: ${NCUSTOMS_DB_URL:jdbc:mysql://192.168.0.46:53306/ncustoms?useUnicode=true&characterEncoding=EUC-KR&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${NCUSTOMS_DB_USERNAME:kcba}
    password: ${NCUSTOMS_DB_PASSWORD:kcbapasswd}
    driver-class-name: ${NCUSTOMS_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    connection-init-sql: ${NCUSTOMS_DB_INIT_SQL:SET NAMES euckr}
  export:
    create-enabled: ${NCUSTOMS_CREATE_ENABLED:false}
    lock-timeout-seconds: ${NCUSTOMS_LOCK_TIMEOUT_SECONDS:10}

client:
  sync:
    push:
      agent-token: ${CLIENT_SYNC_AGENT_TOKEN:}

cariv:
  sync:
    push:
      agent-token: ${CARIV_SYNC_AGENT_TOKEN:cariv-bridge-token-2026-0508}
      previous-agent-token: ${CARIV_SYNC_PREVIOUS_AGENT_TOKEN:}
      require-https: ${CARIV_SYNC_REQUIRE_HTTPS:false}
      allowed-ips: ${CARIV_SYNC_ALLOWED_IPS:}
